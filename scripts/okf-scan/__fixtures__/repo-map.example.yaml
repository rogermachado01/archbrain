    repo: ../orders-service
    branch: { dev: develop, hml: staging, prd: main }
  aws_lambda_function.payments:
    repo: ../payments-service
    branch: { dev: develop, hml: staging, prd: main }

frontend:
  - repo: ../web-storefront
    branch: { dev: develop, hml: staging, prd: main }
